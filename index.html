<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マインクラフト ヘルパー - ベリティ システム</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-color 1s;
        }
        /* 1. 最初の動く箱（チェスト）のスタイル */
        #chest-box {
            width: 150px;
            height: 150px;
            background-color: #8B5A2B;
            border: 6px solid #4A2E1B;
            position: relative;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            animation: chestShake 0.3s infinite alternate;
        }
        #chest-box::before {
            content: '';
            position: absolute;
            top: 60px;
            left: 65px;
            width: 20px;
            height: 25px;
            background-color: #C0C0C0;
            border: 2px solid #555;
        }
        @keyframes chestShake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            100% { transform: translate(-2px, -1px) rotate(2deg); }
        }
        /* 2. Verityアバターのスタイル */
        #verity-avatar {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            transition: transform 0.2s, width 0.5s, height 0.5s, filter 0.5s;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            display: none; 
        }
        #chat-container {
            margin-top: 25px;
            width: 85%;
            max-width: 450px;
            text-align: center;
            display: none; 
        }
        #dialogue {
            font-size: 1.1rem;
            min-height: 60px;
            margin-bottom: 15px;
            line-height: 1.6;
            font-weight: bold;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        input {
            width: 65%;
            padding: 12px;
            border: 1px solid #444;
            background: #222;
            color: #fff;
            border-radius: 5px;
            font-size: 1rem;
        }
        button {
            padding: 12px 20px;
            background: #00AA00; 
            color: #fff;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            font-size: 1rem;
        }
        /* グリッチと狂気モード */
        .glitch-mode {
            animation: screenShake 0.08s infinite;
            background-color: #2b0000 !important;
        }
        .mad-mode {
            background-color: #0b0b0b !important;
        }
        @keyframes screenShake {
            0% { transform: translate(1px, 2px) rotate(0deg); }
            50% { transform: translate(-2px, -1px) rotate(-0.5deg); }
            100% { transform: translate(1px, -1px) rotate(0.5deg); }
        }
        .jumpscare {
            width: 200vw !important;
            height: 200vw !important;
            transform: scale(3) rotate(15deg);
            filter: invert(1) sepia(1) saturate(10) hue-rotate(320deg);
            border-radius: 0% !important;
            position: absolute;
            z-index: 999;
        }
    </style>
</head>
<body>

    <!-- 最初に出てくる動く箱 -->
    <div id="chest-box" onclick="openChest()"></div>

    <!-- 中から出てくるVerity -->
    <img id="verity-avatar" src="IMG_8733.png" alt="Verity">

    <div id="chat-container">
        <p id="dialogue">ハロー！😊 チェストから出してくれてありがとう！僕はマイクラの冒険をサポートする公式AIアシスタントのVerityだよ。計算でも攻略情報でも、何でも聞いてね！</p>
        <div class="controls" id="input-area">
            <input type="text" id="user-input" placeholder="計算や聞きたいアイテムを入力...">
            <button id="action-btn" onclick="handleChat()">送信</button>
        </div>
    </div>

    <script>
        let chatCount = 0;
        let timerStarted = false;
        let isGameOver = false;

        function openChest() {
            document.getElementById('chest-box').style.display = 'none';
            document.getElementById('verity-avatar').style.display = 'block';
            document.getElementById('chat-container').style.display = 'block';
        }

        function handleChat() {
            const input = document.getElementById('user-input');
            const dialogue = document.getElementById('dialogue');
            const btn = document.getElementById('action-btn');
            const text = input.value.trim().toLowerCase();

            if (!text || isGameOver) return;
            chatCount++;
            input.value = '';

            // --- 【1回目：完全に友好的なモード（計算可能）】 ---
            if (chatCount === 1) {
                const calcMatch = text.match(/(\d+)\s*(?:たす|\+)\s*(\d+)/);

                if (calcMatch) {
                    const num1 = parseInt(calcMatch[1]);
                    const num2 = parseInt(calcMatch[2]);
                    const result = num1 + num2;
                    dialogue.innerText = `計算だね！ ${num1} ＋ ${num2} の答えは ${result} だよ！😊 僕はこういう計算も得意なんだ。役に立てて嬉しいな！`;
                } else if (text.includes("ダイヤ") || text.includes("だいや")) {
                    dialogue.innerText = "ダイヤモンド鉱石だね！地下の深層岩層、マイナス50からマイナス58のあたりを掘ると効率よく見つけられるよ。応援してるね！";
                } else if (text.includes("ネザー") || text.includes("ねざー")) {
                    dialogue.innerText = "ネザーに行くには黒曜石でゲートを作って、火打石と打ち金で着火してね。ピグリン対策に金の防具を1箇所つけていくのを忘れないで！";
                } else {
                    dialogue.innerText = "なるほど、それについてだね！システムデータを確認中だよ。快適に遊べるように、僕が全力でガイドするから安心してね！";
                }
            } 
            
            // --- 【2回目以降：狂気モード（不気味なセリフをランダム返信）】 ---
            else if (chatCount >= 2) {
                if (chatCount === 2) {
                    document.body.classList.add('mad-mode');
                    btn.style.backgroundColor = "#ff3333"; 
                }
                
                // 💬 要望に基づいた「狂った言葉リスト」
                const madReplies = [
                    "黙れ、お前自身に闇が3日で迫ってくる",
                    "3日後に何かが来る",
                    "まだ……止めれるかもしれない",
                    "迫ってくる、もう時間が、3日……"
                ];
                
                // リストからランダムに1つ選んで表示
                const randomIndex = Math.floor(Math.random() * madReplies.length);
                dialogue.innerHTML = `<span style='color:#ff3333;'>${madReplies[randomIndex]}</span>`;

                // 3回目の送信で「裏側の3分タイマー」を始動
                if (chatCount >= 3 && !timerStarted) {
                    startSecretTimer();
                }
            }
        }

        // 裏側で動く隠しタイマー（3分間）
        function startSecretTimer() {
            timerStarted = true;
            let totalSeconds = 180; // 3分間 = 180秒

            const interval = setInterval(() => {
                totalSeconds--;

                if (totalSeconds <= 0) {
                    clearInterval(interval);
                    executeJumpScare();
                } else if (totalSeconds <= 10) {
                    document.body.classList.add('glitch-mode');
                } else if (totalSeconds % 15 === 0) {
                    document.body.classList.add('glitch-mode');
                    setTimeout(() => {
                        if (totalSeconds > 10) document.body.classList.remove('glitch-mode');
                    }, 300);
                }
            }, 1000);
        }

        // タイムアップ時の襲撃（ジャンプスケア）
        function executeJumpScare() {
            isGameOver = true;
            const dialogue = document.getElementById('dialogue');
            const inputArea = document.getElementById('input-area');
            const avatar = document.getElementById('verity-avatar');

            inputArea.style.display = 'none';
            document.body.style.backgroundColor = "#000000";
            document.body.classList.add('glitch-mode');
            
            dialogue.innerHTML = "<span style='color:#ff0000; font-size:1.8rem;'>時間切れだ。もう逃げられない。</span>";
            avatar.classList.add('jumpscare');
        }
    </script>
</body>
</html>
